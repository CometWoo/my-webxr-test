<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>AR Navigation Debug</title>
  <script src="https://unpkg.com/three@0.126.0/build/three.js"></script>
  <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
    
    /* AR 세션 시작 전에는 숨김 */
    #overlay-root {
      position: fixed; /* absolute보다 fixed가 안정적 */
      top: 0; left: 0; width: 100vw; height: 100vh;
      display: none; 
      z-index: 999;
      pointer-events: none; /* UI 클릭이 필요하면 자식 요소에서 auto로 변경 */
    }

    /* 디버그 패널 가시성 강화 */
    #debug-panel {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0, 255, 0, 0.2); 
      color: #0f0; border: 1px solid #0f0;
      padding: 10px; border-radius: 5px; font-size: 11px; font-family: monospace;
      pointer-events: auto; /* 디버그 클릭 가능하도록 */
    }

    /* 미니맵 UI 디자인 수정 */
    #minimap-ui {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 35vh;
      /* 배경을 투명하게 해서 WebGL 격자가 보이도록 함 */
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0));
      border-top: 2px solid #0f0;
      box-sizing: border-box;
    }

    #minimap-title {
      color: #0f0; text-align: center; padding-top: 10px;
      font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000;
    }

    #start-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 20px 40px; background: #007AFF; color: white;
      border: none; border-radius: 15px; font-size: 18px; cursor: pointer;
    }
  </style>
</head>
<body>

  <button id="start-btn" onclick="activateXR()">Start AR Navigation</button>

  <div id="overlay-root">
    <div id="debug-panel">
      <div>Status: <span id="status">Waiting...</span></div>
      <div>Pos X: <span id="pos-x">0</span></div>
      <div>Pos Z: <span id="pos-z">0</span></div>
      <div>Map: <span id="map-status">Not Loaded</span></div>
      <div style="margin-top:5px; border-top:1px solid #0f0; padding-top:5px;">
        Cam: <span id="cam-info">0, 0, 0</span>
      </div>
    </div>
    
    <div id="minimap-ui">
      <div id="minimap-title">SYSTEM: TACTICAL MINI MAP</div>
    </div>
  </div>

  <script>
    async function activateXR() {
      const overlayRoot = document.getElementById('overlay-root');
      const startBtn = document.getElementById('start-btn');

      // WebXR 세션 설정
      let session;
      try {
        session = await navigator.xr.requestSession("immersive-ar", {
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: overlayRoot } 
        });
      } catch (e) {
        alert("AR을 지원하지 않는 기기이거나 설정을 확인해주세요: " + e.message);
        return;
      }

      startBtn.style.display = 'none';
      overlayRoot.style.display = 'block'; // 즉시 표시

      const canvas = document.createElement("canvas");
      const gl = canvas.getContext("webgl", { xrCompatible: true });
      const scene = new THREE.Scene();

      // 조명
      scene.add(new THREE.AmbientLight(0xffffff, 1.2));

      // [1] 메인 큐브
      const cube = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshNormalMaterial());
      cube.position.set(0, 0, -0.5);
      scene.add(cube);

      // [2] 미니맵 전용 객체 (Layer 1)
      const playerIcon = new THREE.Mesh(
        new THREE.SphereGeometry(0.04, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0x00ff00 }) // 녹색 점
      );
      playerIcon.layers.set(1);
      scene.add(playerIcon);

      // 격자 가시성 강화 (흰색으로 변경)
      const grid = new THREE.GridHelper(10, 20, 0x00ff00, 0x333333);
      grid.layers.set(1);
      scene.add(grid);

      // 3D 맵 로드
      const loader = new THREE.GLTFLoader();
      loader.load('./assets/library_map.glb', (gltf) => {
        document.getElementById('map-status').innerText = "Loaded";
        const map = gltf.scene;
        map.traverse(n => { if(n.isMesh) n.layers.set(1); });
        scene.add(map);
      }, undefined, (e) => {
        document.getElementById('map-status').innerText = "Error: " + e.message;
      });

      const renderer = new THREE.WebGLRenderer({ alpha: true, canvas: canvas, context: gl, antialias: true });
      renderer.autoClear = false;

      const mainCamera = new THREE.PerspectiveCamera();
      mainCamera.matrixAutoUpdate = false;

      // 미니맵 카메라 (위에서 아래로 내려다봄)
      const minimapCamera = new THREE.OrthographicCamera(-2, 2, 2, -2, 0.1, 100);
      minimapCamera.layers.enable(1);

      session.updateRenderState({ baseLayer: new XRWebGLLayer(session, gl) });
      const refSpace = await session.requestReferenceSpace('local');

      const onXRFrame = (time, frame) => {
        session.requestAnimationFrame(onXRFrame);
        gl.bindFramebuffer(gl.FRAMEBUFFER, session.renderState.baseLayer.framebuffer);

        const pose = frame.getViewerPose(refSpace);
        if (pose) {
          document.getElementById('status').innerText = "Active";
          const view = pose.views[0];
          const viewport = session.renderState.baseLayer.getViewport(view);
          
          const {x, y, z} = view.transform.position;
          
          // 디버그 실시간 업데이트
          document.getElementById('pos-x').innerText = x.toFixed(3);
          document.getElementById('pos-z').innerText = z.toFixed(3);
          document.getElementById('cam-info').innerText = `${x.toFixed(1)}, ${y.toFixed(1)}, ${z.toFixed(1)}`;

          // 미니맵 동기화
          playerIcon.position.set(x, 0, z);
          minimapCamera.position.set(x, 5, z); // 높이 조절
          minimapCamera.lookAt(x, 0, z);

          // 1. 메인 뷰
          renderer.setViewport(0, 0, viewport.width, viewport.height);
          mainCamera.matrix.fromArray(view.transform.matrix);
          mainCamera.projectionMatrix.fromArray(view.projectionMatrix);
          mainCamera.updateMatrixWorld(true);
          
          renderer.clear();
          renderer.render(scene, mainCamera);

          // 2. 미니맵 뷰 (가장 하단)
          const mapH = viewport.height * 0.35;
          renderer.setViewport(0, 0, viewport.width, mapH);
          renderer.setScissor(0, 0, viewport.width, mapH);
          renderer.setScissorTest(true);

          renderer.clearDepth(); 
          renderer.render(scene, minimapCamera);
          
          renderer.setScissorTest(false);
        } else {
          document.getElementById('status').innerText = "Searching Pose...";
        }
      };
      session.requestAnimationFrame(onXRFrame);
    }
  </script>
</body>
</html>
