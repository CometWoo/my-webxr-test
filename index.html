<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>AR Library Navigation</title>

  <script src="https://unpkg.com/three@0.126.0/build/three.js"></script>
  <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
    
    /* 시작 버튼 스타일 */
    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 200;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    /* 하단 1/3 미니맵 컨테이너 스타일 */
    #minimap-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 33vh; /* 화면의 약 1/3 */
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      border-top: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 30px 30px 0 0;
      overflow: hidden;
      z-index: 100;
      pointer-events: none; /* 터치 이벤트가 AR 화면으로 전달되도록 */
      display: none; /* AR 시작 전에는 숨김 */
    }

    #minimap-label {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 1px 1px 2px black;
    }
  </style>
</head>

<body>
  <div id="overlay">
    <button onclick="activateXR()">Start AR Navigation</button>
  </div>

  <div id="minimap-container">
    <div id="minimap-label">MINI MAP</div>
  </div>

  <script>
    async function activateXR() {
      if (!navigator.xr) {
        alert("이 브라우저는 WebXR을 지원하지 않습니다.");
        return;
      }

      // 시작 버튼 숨기기 및 미니맵 보이기
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('minimap-container').style.display = 'block';

      const canvas = document.createElement("canvas");
      document.body.appendChild(canvas);
      const gl = canvas.getContext("webgl", { xrCompatible: true });
      const scene = new THREE.Scene();

      // ---------------------------------------------------------
      // 1. 오브젝트 및 맵 설정
      // ---------------------------------------------------------
      const materials = [
        new THREE.MeshBasicMaterial({ color: 0xff0000 }),
        new THREE.MeshBasicMaterial({ color: 0x0000ff }),
        new THREE.MeshBasicMaterial({ color: 0x00ff00 }),
        new THREE.MeshBasicMaterial({ color: 0xff00ff }),
        new THREE.MeshBasicMaterial({ color: 0x00ffff }),
        new THREE.MeshBasicMaterial({ color: 0xffff00 })
      ];

      // 가이드용 큐브들 (Layer 0: 메인화면/미니맵 둘 다 보임)
      const cubeG = new THREE.BoxGeometry(0.1, 0.1, 0.05);
      const cube1 = new THREE.Mesh(cubeG, materials);
      cube1.position.set(0, 0, -0.5);
      scene.add(cube1);

      const cube2 = new THREE.Mesh(cubeG, materials);
      cube2.position.set(0.5, 0, -1);
      scene.add(cube2);

      // 내 위치 표시용 빨간 점 (Layer 1: 미니맵에만 보임)
      const playerIcon = new THREE.Mesh(
        new THREE.SphereGeometry(0.03, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xff0000 })
      );
      playerIcon.layers.set(1); 
      scene.add(playerIcon);

      // 3D 맵 파일 로드 (Layer 1: 미니맵에만 보임)
      const loader = new THREE.GLTFLoader();
      loader.load('./assets/library_map.glb', (gltf) => {
        const mapModel = gltf.scene;
        mapModel.traverse((node) => {
          if (node.isMesh) node.layers.set(1);
        });
        scene.add(mapModel);
      });

      // ---------------------------------------------------------
      // 2. 카메라 및 렌더러 설정
      // ---------------------------------------------------------
      const renderer = new THREE.WebGLRenderer({
        alpha: true,
        preserveDrawingBuffer: true,
        canvas: canvas,
        context: gl
      });
      renderer.autoClear = false;

      // 메인 XR 카메라 (Layer 0만 봄)
      const camera = new THREE.PerspectiveCamera();
      camera.matrixAutoUpdate = false;

      // 미니맵 카메라 (Layer 0과 1을 모두 봄)
      const mapSize = 5; 
      const minimapCamera = new THREE.OrthographicCamera(-mapSize, mapSize, mapSize, -mapSize, 0.1, 100);
      minimapCamera.layers.enable(1); 

      // ---------------------------------------------------------
      // 3. XR 세션 시작 및 루프
      // ---------------------------------------------------------
      const session = await navigator.xr.requestSession("immersive-ar");
      session.updateRenderState({
        baseLayer: new XRWebGLLayer(session, gl)
      });

      const referenceSpace = await session.requestReferenceSpace('local');
      
      const onXRFrame = (time, frame) => {
        session.requestAnimationFrame(onXRFrame);
        gl.bindFramebuffer(gl.FRAMEBUFFER, session.renderState.baseLayer.framebuffer);

        const pose = frame.getViewerPose(referenceSpace);
        if (pose) {
          const view = pose.views[0];
          const viewport = session.renderState.baseLayer.getViewport(view);
          
          // 사용자의 실제 위치 가져오기
          const userX = view.transform.position.x;
          const userY = view.transform.position.y;
          const userZ = view.transform.position.z;

          // 1. 메인 XR 뷰 렌더링 (전체 화면)
          renderer.setSize(viewport.width, viewport.height);
          camera.matrix.fromArray(view.transform.matrix);
          camera.projectionMatrix.fromArray(view.projectionMatrix);
          camera.updateMatrixWorld(true);
          
          renderer.clear();
          renderer.render(scene, camera);

          // 2. 미니맵 뷰 렌더링 (하단 1/3)
          // 아이콘 및 카메라 위치 업데이트
          playerIcon.position.set(userX, userY, userZ);
          minimapCamera.position.set(userX, 10, userZ); // 사용자 머리 위 10m
          minimapCamera.lookAt(userX, userY, userZ);

          const mapW = viewport.width;
          const mapH = viewport.height * 0.33; // 하단 1/3 영역 계산
          
          renderer.setViewport(0, 0, mapW, mapH);
          renderer.setScissor(0, 0, mapW, mapH);
          renderer.setScissorTest(true);
          
          renderer.render(scene, minimapCamera);
          
          renderer.setScissorTest(false);
          renderer.setViewport(0, 0, viewport.width, viewport.height);
        }
      };

      session.requestAnimationFrame(onXRFrame);
    }
  </script>
</body>
</html>
