<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>AR Navigation Debug - Sync Ready</title>
  <script src="https://unpkg.com/three@0.126.0/build/three.js"></script>
  <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
    
    #overlay-root {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      display: none; z-index: 999; pointer-events: none;
    }

    #debug-panel {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0, 255, 0, 0.2); color: #0f0; border: 1px solid #0f0;
      padding: 10px; border-radius: 5px; font-size: 11px; font-family: monospace;
      pointer-events: auto;
    }

    #minimap-ui {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 35vh;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0));
      border-top: 2px solid #0f0; box-sizing: border-box;
    }

    #minimap-title {
      color: #0f0; text-align: center; padding-top: 10px;
      font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000;
    }

    #start-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 20px 40px; background: #007AFF; color: white;
      border: none; border-radius: 15px; font-size: 18px; cursor: pointer;
    }

    /* 추가된 스캔 버튼 (테스트용) */
    #sync-btn {
      position: absolute; bottom: 38vh; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; background: #FF3B30; color: white;
      border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
      pointer-events: auto; cursor: pointer; display: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <button id="start-btn" onclick="activateXR()">Start AR Navigation</button>

  <div id="overlay-root">
    <div id="debug-panel">
      <div>Status: <span id="status">Waiting...</span></div>
      <div>Pos X: <span id="pos-x">0</span></div>
      <div>Pos Z: <span id="pos-z">0</span></div>
      <div>Map: <span id="map-status">Not Loaded</span></div>
      <div style="margin-top:5px; border-top:1px solid #0f0; padding-top:5px;">
        Cam: <span id="cam-info">0, 0, 0</span>
      </div>
    </div>
    
    <button id="sync-btn" onclick="simulateQRScan()">QR 스캔 (위치 동기화)</button>

    <div id="minimap-ui">
      <div id="minimap-title">SYSTEM: TACTICAL MINI MAP</div>
    </div>
  </div>

  <script>
    // 전역 변수 선언
    let mapGroup, mainCamera, xrSession;
    
// 1. 접속한 URL의 파라미터(?x=...&y=...&z=...)를 읽어옵니다.
const urlParams = new URLSearchParams(window.location.search);

// 2. 값을 추출하고, 숫자로 변환합니다. (값이 없으면 기본값 0을 사용)
const qrX = parseFloat(urlParams.get('x')) || 0;
const qrY = parseFloat(urlParams.get('y')) || 0;
const qrZ = parseFloat(urlParams.get('z')) || 0;

// 3. 추출한 값을 기준점 데이터에 동적으로 삽입합니다.
const serverMarkerData = {
  marker_id: "QR_SCANNED_MARKER",
  coordinates: { x: qrX, y: qrY, z: qrZ }, // URL에서 가져온 진짜 좌표 적용!
  yaw: 0.0 // 마커의 방향값도 필요하다면 URL 파라미터(?yaw=90)로 받을 수 있습니다.
};

console.log(`적용된 QR 좌표: ${qrX}, ${qrY}, ${qrZ}`);

    async function activateXR() {
      const overlayRoot = document.getElementById('overlay-root');
      const startBtn = document.getElementById('start-btn');
      const syncBtn = document.getElementById('sync-btn');

      try {
        xrSession = await navigator.xr.requestSession("immersive-ar", {
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: overlayRoot } 
        });
      } catch (e) {
        alert("AR을 지원하지 않는 기기이거나 설정을 확인해주세요: " + e.message);
        return;
      }

      startBtn.style.display = 'none';
      overlayRoot.style.display = 'block';
      syncBtn.style.display = 'block'; // AR 시작 후 동기화 버튼 표시

      const canvas = document.createElement("canvas");
      const gl = canvas.getContext("webgl", { xrCompatible: true });
      const scene = new THREE.Scene();

      scene.add(new THREE.AmbientLight(0xffffff, 1.2));

      // 🌟 핵심 포인트 1: 맵과 관련된 모든 오브젝트를 하나의 그룹으로 묶습니다.
      mapGroup = new THREE.Group();
      scene.add(mapGroup);

      // 격자 (mapGroup에 추가)
      const grid = new THREE.GridHelper(20, 40, 0x00ff00, 0x333333);
      grid.layers.set(1);
      mapGroup.add(grid); // scene.add() 대신 mapGroup.add()

      // 3D 맵 로드 (mapGroup에 추가)
      const loader = new THREE.GLTFLoader();
      loader.load('./assets/library_map.glb', (gltf) => {
        document.getElementById('map-status').innerText = "Loaded";
        const map = gltf.scene;
        map.traverse(n => { if(n.isMesh) n.layers.set(1); });
        mapGroup.add(map); // 맵 통째로 그룹에 포함
      }, undefined, (e) => {
        document.getElementById('map-status').innerText = "Simulated Map Loaded";
        // 에러가 나도 테스트할 수 있도록 임시 큐브를 맵 자리에 추가
        const dummyMap = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 2), new THREE.MeshNormalMaterial());
        dummyMap.position.set(serverMarkerData.coordinates.x, serverMarkerData.coordinates.y, serverMarkerData.coordinates.z);
        dummyMap.layers.set(1);
        mapGroup.add(dummyMap);
      });

      // 미니맵용 플레이어 아이콘 (이것은 실제 카메라 위치를 따라가므로 mapGroup 밖에 둡니다)
      const playerIcon = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xff0000 })
      );
      playerIcon.layers.set(1);
      scene.add(playerIcon);

      const renderer = new THREE.WebGLRenderer({ alpha: true, canvas: canvas, context: gl, antialias: true });
      renderer.autoClear = false;

      mainCamera = new THREE.PerspectiveCamera();
      mainCamera.matrixAutoUpdate = false;

      // 시야각 60도, 원근감을 가진 카메라로 변경합니다.
      const minimapCamera = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight * 0.35), 0.1, 100);
      minimapCamera.layers.enable(1);
      
      xrSession.updateRenderState({ baseLayer: new XRWebGLLayer(xrSession, gl) });
      const refSpace = await xrSession.requestReferenceSpace('local');

      const onXRFrame = (time, frame) => {
        xrSession.requestAnimationFrame(onXRFrame);
        gl.bindFramebuffer(gl.FRAMEBUFFER, xrSession.renderState.baseLayer.framebuffer);

        const pose = frame.getViewerPose(refSpace);
        if (pose) {
          const view = pose.views[0];
          const viewport = xrSession.renderState.baseLayer.getViewport(view);
          
const {x, y, z} = view.transform.position;

// 1. 현재 카메라의 월드(물리적) 좌표
const camWorldPos = new THREE.Vector3(x, y, z);

// 2. 🌟 핵심: 월드 좌표를 mapGroup 기준의 로컬 좌표(블렌더 도면 좌표)로 변환
const camMapPos = mapGroup.worldToLocal(camWorldPos.clone());

// 3. 디버그 UI에는 변환된 맵 기준 좌표를 출력!
document.getElementById('pos-x').innerText = camMapPos.x.toFixed(3);
document.getElementById('pos-z').innerText = camMapPos.z.toFixed(3);
document.getElementById('cam-info').innerText = `${camMapPos.x.toFixed(1)}, ${camMapPos.y.toFixed(1)}, ${camMapPos.z.toFixed(1)}`;

// 미니맵 플레이어 아이콘 위치 동기화
playerIcon.position.set(x, 0, z);

// 1. 메인 카메라(사용자)의 현재 방향(회전값)을 추출합니다.
const camEuler = new THREE.Euler().setFromQuaternion(mainCamera.quaternion, 'YXZ');

// 2. 플레이어 등 뒤 45도 위에서 바라보도록 오프셋(거리와 높이)을 설정합니다.
// 높이(y)와 거리(z)를 똑같이 4로 주면 정확히 45도 각도가 됩니다. 숫자를 키우면 더 멀리서 봅니다.
const offset = new THREE.Vector3(0, 4, 4);

// 3. 오프셋 벡터를 사용자가 바라보는 방향(Y축)에 맞춰 회전시킵니다.
offset.applyAxisAngle(new THREE.Vector3(0, 1, 0), camEuler.y);

// 4. 미니맵 카메라 위치를 "플레이어 위치 + 회전된 오프셋"으로 이동시킵니다.
minimapCamera.position.copy(playerIcon.position).add(offset);

// 5. 카메라는 항상 플레이어 아이콘(발밑)을 바라보게 합니다.
minimapCamera.lookAt(playerIcon.position);

          // 메인 뷰
          renderer.setViewport(0, 0, viewport.width, viewport.height);
          mainCamera.matrix.fromArray(view.transform.matrix);
          mainCamera.projectionMatrix.fromArray(view.projectionMatrix);
          mainCamera.updateMatrixWorld(true);
          
          renderer.clear();
          renderer.render(scene, mainCamera);

          // 미니맵 뷰
          const mapH = viewport.height * 0.35;
          renderer.setViewport(0, 0, viewport.width, mapH);
          renderer.setScissor(0, 0, viewport.width, mapH);
          renderer.setScissorTest(true);
          // 🌟 추가할 코드: 뷰포트 크기에 맞춰 카메라 비율 업데이트
          minimapCamera.aspect = viewport.width / mapH;
          minimapCamera.updateProjectionMatrix();

          renderer.clearDepth(); 
          renderer.render(scene, minimapCamera);

          renderer.setScissorTest(false);

          renderer.clearDepth(); 
          renderer.render(scene, minimapCamera);
          
          renderer.setScissorTest(false);
        } else {
          document.getElementById('status').innerText = "Searching Pose...";
        }
      };
      xrSession.requestAnimationFrame(onXRFrame);
    }

    // 🌟 핵심 포인트 2: QR 스캔 및 동기화 로직
    function simulateQRScan() {
      if (!mainCamera || !mapGroup) return;

      document.getElementById('status').innerText = "Syncing...!";
      
      // 1. 현재 카메라(사용자)의 위치와 방향을 가져옵니다.
      // (실제 WebXR Image Tracking API를 쓰면 이 자리에 '인식된 이미지의 Pose'가 들어갑니다)
      const currentCamPos = new THREE.Vector3();
      const currentCamQuat = new THREE.Quaternion();
      currentCamPos.setFromMatrixPosition(mainCamera.matrixWorld);
      currentCamQuat.setFromRotationMatrix(mainCamera.matrixWorld);

      // 맵 그룹 초기화 (계산을 위해 일단 원점으로 되돌림)
      mapGroup.position.set(0, 0, 0);
      mapGroup.quaternion.identity();
      mapGroup.updateMatrixWorld(true);

      // JSON에서 가져온 맵 상의 기준점 위치
      const jsonPos = new THREE.Vector3(
        serverMarkerData.coordinates.x,
        serverMarkerData.coordinates.y,
        serverMarkerData.coordinates.z
      );

      // [Step A: 방향 맞추기] 
      // 사용자가 바라보는 방향(Y축 회전)과 JSON에 정의된 방향을 일치시킵니다.
      const euler = new THREE.Euler().setFromQuaternion(currentCamQuat, 'YXZ');
      mapGroup.rotation.y = euler.y - serverMarkerData.yaw;
      mapGroup.updateMatrixWorld(true);

      // [Step B: 위치 맞추기]
      // 방향이 맞춰진 맵을 기준으로, JSON 마커 위치가 실제 카메라(마커) 위치와 겹치도록 이동시킵니다.
      // 1. 회전이 적용된 상태의 JSON 마커 월드 좌표를 계산합니다.
      const rotatedJsonPos = jsonPos.clone().applyMatrix4(mapGroup.matrixWorld);
      
      // 2. 현재 카메라 위치와 계산된 좌표의 차이(오프셋)를 구합니다.
      const offset = new THREE.Vector3().subVectors(currentCamPos, rotatedJsonPos);
      
      // 3. 맵 전체를 오프셋만큼 밀어줍니다. (높이 Y축은 보통 바닥 0으로 고정하는 것이 안정적입니다)
      offset.y = 0; 
      mapGroup.position.copy(offset);
      mapGroup.updateMatrixWorld(true);

      document.getElementById('status').innerText = "Location Synced!";
      document.getElementById('status').style.color = "#FFD700"; // 성공 시 노란색 표시
      document.getElementById('sync-btn').innerText = "동기화 완료";
      document.getElementById('sync-btn').style.background = "#34C759";
      
      // 3초 후 버튼 숨기기
      setTimeout(() => {
        document.getElementById('sync-btn').style.display = 'none';
      }, 3000);
    }
  </script>
</body>
</html>
